name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on tags like v0.1.0, v1.2.3, etc.
  workflow_dispatch:  # Allows manual triggering
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # First job: Build and verify all crates
  verify:
    name: Verify Release Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --verbose --all-features

      - name: Build release
        run: cargo build --release --all-features

  # Second job: Check version consistency
  check-versions:
    name: Check Version Consistency
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      types-version: ${{ steps.get-version.outputs.types-version }}
      sdk-version: ${{ steps.get-version.outputs.sdk-version }}
      cli-version: ${{ steps.get-version.outputs.cli-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag or input
        id: get-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Extract versions from Cargo.toml files
          TYPES_VERSION=$(grep '^version = ' crates/aleph-types/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          SDK_VERSION=$(grep '^version = ' crates/aleph-sdk/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          CLI_VERSION=$(grep '^version = ' crates/aleph-cli/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          
          echo "types-version=$TYPES_VERSION" >> $GITHUB_OUTPUT
          echo "sdk-version=$SDK_VERSION" >> $GITHUB_OUTPUT
          echo "cli-version=$CLI_VERSION" >> $GITHUB_OUTPUT
          
          echo "Tag version: $VERSION"
          echo "aleph-types version: $TYPES_VERSION"
          echo "aleph-sdk version: $SDK_VERSION"
          echo "aleph-cli version: $CLI_VERSION"

      - name: Verify version consistency
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          TYPES_VERSION="${{ steps.get-version.outputs.types-version }}"
          SDK_VERSION="${{ steps.get-version.outputs.sdk-version }}"
          CLI_VERSION="${{ steps.get-version.outputs.cli-version }}"
          
          if [ "$VERSION" != "$TYPES_VERSION" ] || [ "$VERSION" != "$SDK_VERSION" ] || [ "$VERSION" != "$CLI_VERSION" ]; then
            echo "Error: Version mismatch detected!"
            echo "Tag version: $VERSION"
            echo "aleph-types: $TYPES_VERSION"
            echo "aleph-sdk: $SDK_VERSION"
            echo "aleph-cli: $CLI_VERSION"
            exit 1
          fi
          
          echo "✓ All versions are consistent: $VERSION"

  # Third job: Verify the GitHub release exists before building binaries
  check-release:
    name: Verify Release Exists
    needs: [check-versions]
    runs-on: ubuntu-latest
    steps:
      - name: Verify release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.check-versions.outputs.version }}"
          if ! gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "::error::Release with tag $TAG not found. Please create the release manually before triggering this workflow."
            exit 1
          fi

  # Fourth job: Build release binaries and attach to existing release
  build-binaries:
    name: Build Release Binaries
    needs: [verify, check-versions, check-release]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: aleph
            asset_name: aleph-cli-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: aleph.exe
            asset_name: aleph-cli-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: aleph
            asset_name: aleph-cli-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: aleph
            asset_name: aleph-cli-macos-aarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --package aleph-cli --target ${{ matrix.target }}

      - name: Rename binary to unique asset name
        shell: bash
        run: cp "./target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "${{ matrix.asset_name }}"

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.check-versions.outputs.version }}" \
            "${{ matrix.asset_name }}" \
            --repo "${{ github.repository }}" \
            --clobber

  # Sixth job: Build .deb and publish to APT repository (GitHub Pages)
  #
  # GPG key setup (one-time):
  #   1. Generate an Ed25519 signing key:
  #        gpg --batch --gen-key <<EOF
  #        Key-Type: EdDSA
  #        Key-Curve: ed25519
  #        Name-Real: Aleph Cloud Packaging
  #        Name-Email: packaging@aleph.im
  #        %no-protection
  #        %commit
  #        EOF
  #   2. Store the private key as the APT_GPG_PRIVATE_KEY secret:
  #        gpg --export-secret-keys --armor packaging@aleph.im
  #   3. The public key is exported automatically by the workflow to apt.aleph.im/gpg.key.
  #
  # Key compromise recovery:
  #   Generate a new key, update the APT_GPG_PRIVATE_KEY secret, and publish a
  #   security advisory asking users to re-run the install script. There is no way
  #   to rotate keys transparently after a compromise — this is an inherent
  #   limitation of all APT repositories.
  #
  # Required secrets:
  #   - APT_GPG_PRIVATE_KEY: ASCII-armored private key (from step 2 above)
  #   - APT_REPO_TOKEN: PAT with write access to aleph-im/apt
  #
  publish-apt:
    name: Publish to APT Repository
    needs: [check-versions, build-binaries]
    runs-on: ubuntu-latest
    environment: apt
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deb-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb -p aleph-cli

      - name: Upload .deb to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEB_FILE=$(find target/debian -name "aleph-cli_*.deb" | head -1)
          gh release upload "v${{ needs.check-versions.outputs.version }}" \
            "$DEB_FILE" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Import GPG signing key
        run: echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Checkout APT repository
        uses: actions/checkout@v4
        with:
          repository: aleph-im/apt
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo

      - name: Ensure reprepro config exists
        run: |
          mkdir -p apt-repo/conf
          cat > apt-repo/conf/distributions <<EOF
          Origin: Aleph.im
          Label: Aleph.im
          Codename: stable
          Architectures: amd64
          Components: main
          Description: Aleph Cloud CLI packages
          SignWith: yes
          EOF
          cat > apt-repo/conf/options <<EOF
          verbose
          basedir .
          EOF

      - name: Export public GPG key
        run: gpg --export --armor > apt-repo/gpg.key

      - name: Ensure GitHub Pages files exist
        run: |
          echo "apt.aleph.im" > apt-repo/CNAME
          cp packaging/apt/install.sh apt-repo/install.sh

      - name: Update APT repository
        run: |
          cd apt-repo
          DEB_FILE=$(find ../target/debian -name "aleph-cli_*.deb" | head -1)
          reprepro remove stable aleph-cli || true
          reprepro includedeb stable "$DEB_FILE"

      - name: Push APT repository
        run: |
          cd apt-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update aleph-cli to v${{ needs.check-versions.outputs.version }}"
          git push

  # Seventh job: Update Homebrew tap with new formula
  #
  # Required secrets (in the `brew` GitHub environment):
  #   - BREW_REPO_TOKEN: PAT with Contents read/write on aleph-im/homebrew-tap
  #
  publish-brew:
    name: Publish to Homebrew Tap
    needs: [check-versions, build-binaries]
    runs-on: ubuntu-latest
    environment: brew
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download macOS release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.check-versions.outputs.version }}"
          gh release download "$VERSION" \
            --repo "${{ github.repository }}" \
            --pattern "aleph-cli-macos-*" \
            --dir ./artifacts

      - name: Verify downloads
        run: |
          test -f ./artifacts/aleph-cli-macos-aarch64 || { echo "Missing aarch64 binary"; exit 1; }
          test -f ./artifacts/aleph-cli-macos-x86_64 || { echo "Missing x86_64 binary"; exit 1; }

      - name: Generate formula from template
        run: |
          VERSION="${{ needs.check-versions.outputs.version }}"
          SHA_ARM64=$(sha256sum ./artifacts/aleph-cli-macos-aarch64 | cut -d' ' -f1)
          SHA_X86_64=$(sha256sum ./artifacts/aleph-cli-macos-x86_64 | cut -d' ' -f1)

          sed -e "s/{{version}}/$VERSION/g" \
              -e "s/{{sha256_arm64}}/$SHA_ARM64/g" \
              -e "s/{{sha256_x86_64}}/$SHA_X86_64/g" \
              packaging/brew/formula.rb.tmpl > aleph-cli.rb

          if grep -q '{{' aleph-cli.rb; then
            echo "Error: Unreplaced placeholders in formula"
            exit 1
          fi

          echo "Generated formula:"
          cat aleph-cli.rb

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: aleph-im/homebrew-tap
          token: ${{ secrets.BREW_REPO_TOKEN }}
          path: homebrew-tap

      - name: Update formula and push
        run: |
          mkdir -p homebrew-tap/Formula
          cp aleph-cli.rb homebrew-tap/Formula/aleph-cli.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aleph-cli.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged, skipping push"
          else
            git commit -m "Update aleph-cli to v${{ needs.check-versions.outputs.version }}"
            git push
          fi

  # Eighth job: Manual approval step before publishing to crates.io
  request-publish-approval:
    name: Request Publish Approval
    runs-on: ubuntu-latest
    needs: [verify, check-versions, build-binaries]
    environment:
      name: crates-io-publish  # Requires manual approval in GitHub
    steps:
      - name: Approval checkpoint
        run: |
          echo "✓ All checks passed"
          echo "✓ Binaries built and attached to release"
          echo "✓ Ready to publish to crates.io"
          echo ""
          echo "Crates to be published:"
          echo "  - aleph-types v${{ needs.check-versions.outputs.version }}"
          echo "  - aleph-sdk v${{ needs.check-versions.outputs.version }}"
          echo "  - aleph-cli v${{ needs.check-versions.outputs.version }}"

  # Ninth job: Publish to crates.io (only runs after manual approval)
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check-versions, request-publish-approval]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish aleph-types
        run: |
          cd crates/aleph-types
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: false

      - name: Wait for aleph-types to be available
        run: |
          echo "Waiting 30 seconds for aleph-types to propagate on crates.io..."
          sleep 30

      - name: Publish aleph-sdk
        run: |
          cd crates/aleph-sdk
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: false

      - name: Wait for aleph-sdk to be available
        run: |
          echo "Waiting 30 seconds for aleph-sdk to propagate on crates.io..."
          sleep 30

      - name: Publish aleph-cli
        run: |
          cd crates/aleph-cli
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: false

      - name: Update release with crates.io links
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.check-versions.outputs.version }}';
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.data.find(r => r.tag_name === `v${version}`);
            if (release) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                body: release.body + '\n\n---\n✅ **Published to crates.io**\n' +
                      `- [aleph-types](https://crates.io/crates/aleph-types/${version})\n` +
                      `- [aleph-sdk](https://crates.io/crates/aleph-sdk/${version})\n` +
                      `- [aleph-cli](https://crates.io/crates/aleph-cli/${version})\n`
              });
            }
