name: Release aleph-cid

# aleph-cid (crates.io) and its Python binding aleph-cid-python (PyPI, as
# `aleph-cid`) are versioned and released in lockstep from a single tag,
# independently of the aleph-types/aleph-sdk/aleph-cli trio (see release.yml).
# Cut a release by bumping both crates/aleph-cid/Cargo.toml and
# crates/aleph-cid-python/Cargo.toml to the same version, creating a GitHub
# release with tag aleph-cid-vX.Y.Z, and letting this workflow publish after
# manual approval. The crates.io step skips itself if the version is already
# published, so a binding-only release can re-run via workflow_dispatch.
#
# PyPI publishing uses trusted publishing (OIDC): the `aleph-cid` project on
# PyPI must have this repository and workflow configured as a trusted
# publisher, with GitHub environment `pypi-publish`.

on:
  push:
    tags:
      - 'aleph-cid-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # First job: Verify version consistency and extract version
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is-prerelease: ${{ steps.get-version.outputs.is-prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version from tag or input
        id: get-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/aleph-cid-v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          IS_PRERELEASE="false"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "is-prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

          CARGO_VERSION=$(grep '^version = ' crates/aleph-cid/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          PY_VERSION=$(grep '^version = ' crates/aleph-cid-python/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $VERSION"
          echo "aleph-cid Cargo.toml version: $CARGO_VERSION"
          echo "aleph-cid-python Cargo.toml version: $PY_VERSION"

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Version mismatch! Tag says $VERSION but aleph-cid Cargo.toml says $CARGO_VERSION"
            exit 1
          fi

          if [ "$VERSION" != "$PY_VERSION" ]; then
            echo "Error: Version mismatch! Tag says $VERSION but aleph-cid-python Cargo.toml says $PY_VERSION"
            exit 1
          fi

          echo "✓ Version consistent: $VERSION"

  # Second job: Build and test on all platforms (Rust crate + Python binding)
  verify:
    name: Verify Release Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests (all features)
        run: cargo test --verbose -p aleph-cid --all-features

      - name: Run tests (no default features)
        run: cargo test --verbose -p aleph-cid --no-default-features

      - name: Build release
        run: cargo build --release -p aleph-cid

      - name: Build and install the Python extension
        run: pip install ./crates/aleph-cid-python pytest

      - name: Run pytest
        run: pytest crates/aleph-cid-python/tests -v

  # Third job: Verify the crate packages cleanly for crates.io
  package-check:
    name: Verify Packaging
    needs: [check-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish dry run
        run: cargo publish -p aleph-cid --dry-run

  # Fourth job: Build release wheels for all supported platforms
  build-wheels:
    name: Build wheels (${{ matrix.platform.os }} ${{ matrix.platform.target }})
    needs: [check-version]
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: windows-latest
            target: x64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path crates/aleph-cid-python/Cargo.toml
          manylinux: auto

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist

  # Fifth job: Build the Python source distribution
  build-sdist:
    name: Build sdist
    needs: [check-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/aleph-cid-python/Cargo.toml

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  # Sixth job: Verify the GitHub release exists
  check-release:
    name: Verify Release Exists
    needs: [check-version]
    runs-on: ubuntu-latest
    steps:
      - name: Verify release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="aleph-cid-v${{ needs.check-version.outputs.version }}"
          if ! gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "::error::Release with tag $TAG not found. Please create the release manually before triggering this workflow."
            exit 1
          fi

  # Seventh job: Publish to crates.io (only runs after manual approval)
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check-version, verify, package-check, build-wheels, build-sdist, check-release]
    environment:
      name: crates-io-publish  # Requires manual approval in GitHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish aleph-cid
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          # Skip if this version is already on crates.io. This keeps the
          # pipeline re-runnable for binding-only releases via
          # workflow_dispatch.
          if curl -sf https://index.crates.io/al/ep/aleph-cid | grep -q "\"vers\":\"$VERSION\""; then
            echo "aleph-cid $VERSION is already on crates.io, skipping publish"
            exit 0
          fi
          cd crates/aleph-cid
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Eighth job: Publish to PyPI (only runs after manual approval)
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [check-version, publish-crate]
    environment:
      name: pypi-publish  # Requires manual approval in GitHub
    permissions:
      id-token: write  # PyPI trusted publishing (OIDC)
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -l dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  # Ninth job: Link the published packages from the GitHub release
  update-release:
    name: Update GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, publish-crate, publish-pypi]
    permissions:
      contents: write
    steps:
      - name: Update release with registry links
        uses: actions/github-script@v8
        with:
          script: |
            const version = '${{ needs.check-version.outputs.version }}';
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.data.find(r => r.tag_name === `aleph-cid-v${version}`);
            if (release) {
              const link = `\n\n---\n📦 Published to crates.io: [aleph-cid v${version}](https://crates.io/crates/aleph-cid/${version})\n🐍 Published to PyPI: [aleph-cid ${version}](https://pypi.org/project/aleph-cid/${version}/)`;
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                body: (release.body || '') + link,
              });
            }
