name: Release aleph-cid

# aleph-cid is versioned and released independently of the
# aleph-types/aleph-sdk/aleph-cli trio (see release.yml): it changes rarely,
# and the trio depends on the published version from crates.io. Cut a release
# by bumping crates/aleph-cid/Cargo.toml, creating a GitHub release with tag
# aleph-cid-vX.Y.Z, and letting this workflow publish after manual approval.

on:
  push:
    tags:
      - 'aleph-cid-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # First job: Verify version consistency and extract version
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is-prerelease: ${{ steps.get-version.outputs.is-prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Extract version from tag or input
        id: get-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/aleph-cid-v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          IS_PRERELEASE="false"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "is-prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

          CARGO_VERSION=$(grep '^version = ' crates/aleph-cid/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Version mismatch! Tag says $VERSION but Cargo.toml says $CARGO_VERSION"
            exit 1
          fi

          echo "✓ Version consistent: $VERSION"

  # Second job: Build and test on all platforms
  verify:
    name: Verify Release Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests (all features)
        run: cargo test --verbose -p aleph-cid --all-features

      - name: Run tests (no default features)
        run: cargo test --verbose -p aleph-cid --no-default-features

      - name: Build release
        run: cargo build --release -p aleph-cid

  # Third job: Verify the crate packages cleanly for crates.io
  package-check:
    name: Verify Packaging
    needs: [check-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish dry run
        run: cargo publish -p aleph-cid --dry-run

  # Fourth job: Verify the GitHub release exists
  check-release:
    name: Verify Release Exists
    needs: [check-version]
    runs-on: ubuntu-latest
    steps:
      - name: Verify release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="aleph-cid-v${{ needs.check-version.outputs.version }}"
          if ! gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "::error::Release with tag $TAG not found. Please create the release manually before triggering this workflow."
            exit 1
          fi

  # Fifth job: Publish to crates.io (only runs after manual approval)
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [check-version, verify, package-check, check-release]
    environment:
      name: crates-io-publish  # Requires manual approval in GitHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish aleph-cid
        run: |
          cd crates/aleph-cid
          cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: false

      - name: Update release with crates.io link
        uses: actions/github-script@v8
        with:
          script: |
            const version = '${{ needs.check-version.outputs.version }}';
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.data.find(r => r.tag_name === `aleph-cid-v${version}`);
            if (release) {
              const link = `\n\n---\n📦 Published to crates.io: [aleph-cid v${version}](https://crates.io/crates/aleph-cid/${version})`;
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                body: (release.body || '') + link,
              });
            }
