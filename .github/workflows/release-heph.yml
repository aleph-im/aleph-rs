name: Release Heph

on:
  push:
    tags:
      - 'heph-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # First job: Verify version consistency and extract version
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is-prerelease: ${{ steps.get-version.outputs.is-prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag or input
        id: get-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/heph-v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          IS_PRERELEASE="false"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "is-prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

          CARGO_VERSION=$(grep '^version = ' crates/heph/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: Version mismatch! Tag says $VERSION but Cargo.toml says $CARGO_VERSION"
            exit 1
          fi

          echo "✓ Version consistent: $VERSION"

  # Second job: Build and test on all platforms
  verify:
    name: Verify Release Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --verbose -p heph

      - name: Build release
        run: cargo build --release -p heph

  # Third job: Verify the GitHub release exists
  check-release:
    name: Verify Release Exists
    needs: [check-version]
    runs-on: ubuntu-latest
    steps:
      - name: Verify release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="heph-v${{ needs.check-version.outputs.version }}"
          if ! gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "::error::Release with tag $TAG not found. Please create the release manually before triggering this workflow."
            exit 1
          fi

  # Fourth job: Build release binaries and attach to existing release
  build-binaries:
    name: Build Release Binaries
    needs: [verify, check-version, check-release]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: heph
            asset_name: heph-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: heph.exe
            asset_name: heph-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: heph
            asset_name: heph-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: heph
            asset_name: heph-macos-aarch64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --package heph --target ${{ matrix.target }}

      - name: Upload Release Asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "heph-v${{ needs.check-version.outputs.version }}" \
            "./target/${{ matrix.target }}/release/${{ matrix.artifact_name }}#${{ matrix.asset_name }}" \
            --repo "${{ github.repository }}" \
            --clobber

  # Fifth job: Build and push Docker image
  docker:
    name: Build Docker Image
    needs: [verify, check-version, check-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: docker-tags
        run: |
          TAGS="ghcr.io/${{ github.repository_owner }}/heph:${{ needs.check-version.outputs.version }}"
          if [ "${{ needs.check-version.outputs.is-prerelease }}" != "true" ]; then
            TAGS="${TAGS}
          ghcr.io/${{ github.repository_owner }}/heph:latest"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/heph/Dockerfile
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
